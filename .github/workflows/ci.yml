name: CI
on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  python-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - run: uv run pytest tests/ -v

  typescript-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Build @clearproof/proof (dependency of cli)
        run: cd packages/proof && npx tsc
      - run: cd packages/proof && npx tsc --noEmit
      - run: cd packages/cli && npx tsc --noEmit

  hardhat-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - run: cd packages/contracts && npx hardhat test

  circuits:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install
      - name: Install circom
        run: |
          curl -L https://github.com/iden3/circom/releases/download/v2.2.2/circom-linux-amd64 -o /usr/local/bin/circom
          chmod +x /usr/local/bin/circom
      - name: Verify circom checksum
        run: |
          # TODO: Replace with the actual SHA-256 hash from the circom v2.2.2 release.
          # Obtain it by running: sha256sum /usr/local/bin/circom
          # after a verified download, then pin it here.
          EXPECTED_SHA256="PLACEHOLDER_REPLACE_WITH_ACTUAL_SHA256_OF_CIRCOM_V2_2_2_LINUX_AMD64"
          echo "${EXPECTED_SHA256}  /usr/local/bin/circom" | sha256sum -c -
      - name: Compile circuits (syntax check)
        run: |
          mkdir -p /tmp/circuit-build
          circom circuits/compliance.circom --r1cs --sym -l node_modules -o /tmp/circuit-build

name: Update Sanctions Tree

on:
  schedule:
    # Daily at 06:00 UTC — after OFAC SDN list typically updates
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

permissions:
  contents: write

jobs:
  update-sanctions-tree:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - uses: astral-sh/setup-uv@v4

      - run: npm install

      - run: uv sync --all-extras

      - name: Build sanctions Merkle tree
        run: uv run python scripts/build_sanctions_tree.py

      - name: Check for changes
        id: diff
        run: |
          git diff --quiet artifacts/sanctions_tree.json && echo "changed=false" >> "$GITHUB_OUTPUT" || echo "changed=true" >> "$GITHUB_OUTPUT"

      - name: Commit updated sanctions tree
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add artifacts/sanctions_tree.json
          git commit -m "chore: update sanctions Merkle tree (automated daily refresh)"
          git push
